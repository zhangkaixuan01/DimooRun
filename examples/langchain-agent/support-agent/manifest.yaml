schema_version: "1.0"
name: support-agent
version: "0.1.0"
runtime:
  framework: langchain-agent
  adapter: langchain-agent
  entrypoint: agent:build_agent
  python: ">=3.11"
capabilities:
  invoke: true
  stream: true
  tool_events: true
  model_events: true
  token_usage: true
dependencies:
  - langchain==1.3.1
  - langchain-core==1.4.0
required_secrets: []
security:
  network_policy: restricted
  allow_file_system_write: false
