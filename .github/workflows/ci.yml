name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  backend:
    name: Backend, Docs, And Deployment Contracts
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v4

      - name: Install Python dependencies
        run: uv sync --all-extras --dev

      - name: Run backend and contract tests
        run: uv run pytest -q

      - name: Run Ruff
        run: uv run ruff check apps tests packages/sdk-python scripts migrations

      - name: Run mypy
        run: uv run mypy apps/server tests scripts

      - name: Run docs quality gate
        run: uv run python scripts/docs_quality.py

      - name: Run Compose static smoke
        run: uv run python scripts/compose_smoke.py

      - name: Run Helm static smoke
        run: uv run python scripts/helm_smoke.py

  frontend:
    name: Console
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/console
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/console/package-lock.json

      - name: Install Console dependencies
        run: npm ci

      - name: Run Console contract tests
        run: npm run test

      - name: Run Console unit tests
        run: npm run test:unit

      - name: Build Console E2E bundle
        run: npm run build:e2e

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Console browser tests
        run: npm run test:e2e

      - name: Run Console Phase 6 browser workflow
        run: npx playwright test tests/e2e/console-runtime.spec.ts tests/e2e/accessibility.spec.ts tests/e2e/responsive-snapshots.spec.ts --project=chrome --output test-results-6-proof
        env:
          PLAYWRIGHT_HTML_REPORT: playwright-report-6

      - name: Run Console Phase 0A browser workflow
        run: npm run test:e2e:0a
        env:
          PLAYWRIGHT_HTML_REPORT: playwright-report-0a

      - name: Run Console Phase 0B browser workflow
        run: npm run test:e2e:0b
        env:
          PLAYWRIGHT_HTML_REPORT: playwright-report-0b

      - name: Run Console Phase 0C browser workflow
        run: npm run test:e2e:0c
        env:
          PLAYWRIGHT_HTML_REPORT: playwright-report-0c

      - name: Run Console Phase 0D browser workflow
        run: npm run test:e2e:0d
        env:
          PLAYWRIGHT_HTML_REPORT: playwright-report-0d

      - name: Run Console Phase 0H browser workflow
        run: npm run test:e2e:0h
        env:
          PLAYWRIGHT_HTML_REPORT: playwright-report-0h

      - name: Run Console Phase 0I browser workflow
        run: npm run test:e2e:0i
        env:
          PLAYWRIGHT_HTML_REPORT: playwright-report-0i

      - name: Run Console Phase 0J browser workflow
        run: npm run test:e2e:0j
        env:
          PLAYWRIGHT_HTML_REPORT: playwright-report-0j

      - name: Run Console Phase 0K browser workflow
        run: npm run test:e2e:0k
        env:
          PLAYWRIGHT_HTML_REPORT: playwright-report-0k

      - name: Run Console Phase 0L browser workflow
        run: npm run test:e2e:0l
        env:
          PLAYWRIGHT_HTML_REPORT: playwright-report-0l

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: console-playwright-report
          path: apps/console/playwright-report
          if-no-files-found: ignore

      - name: Upload Phase 6 Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: console-playwright-6-report
          path: apps/console/playwright-report-6
          if-no-files-found: ignore

      - name: Upload Phase 0A Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: console-playwright-0a-report
          path: apps/console/playwright-report-0a
          if-no-files-found: ignore

      - name: Upload Phase 0B Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: console-playwright-0b-report
          path: apps/console/playwright-report-0b
          if-no-files-found: ignore

      - name: Upload Phase 0C Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: console-playwright-0c-report
          path: apps/console/playwright-report-0c
          if-no-files-found: ignore

      - name: Upload Phase 0D Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: console-playwright-0d-report
          path: apps/console/playwright-report-0d
          if-no-files-found: ignore

      - name: Upload Phase 0H Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: console-playwright-0h-report
          path: apps/console/playwright-report-0h
          if-no-files-found: ignore

      - name: Upload Phase 0I Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: console-playwright-0i-report
          path: apps/console/playwright-report-0i
          if-no-files-found: ignore

      - name: Upload Phase 0J Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: console-playwright-0j-report
          path: apps/console/playwright-report-0j
          if-no-files-found: ignore

      - name: Upload Phase 0K Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: console-playwright-0k-report
          path: apps/console/playwright-report-0k
          if-no-files-found: ignore

      - name: Upload Phase 0L Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: console-playwright-0l-report
          path: apps/console/playwright-report-0l
          if-no-files-found: ignore
