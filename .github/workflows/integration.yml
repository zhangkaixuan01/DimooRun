name: Integration

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  compose-runtime:
    name: Compose Runtime Smoke
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v4

      - name: Install Python dependencies
        run: uv sync --all-extras --dev

      - name: Prepare Compose environment
        run: cp .env.example .env

      - name: Start Compose runtime smoke
        run: |
          set -o pipefail
          mkdir -p compose-diagnostics
          uv run python scripts/compose_runtime_smoke.py 2>&1 | tee compose-runtime-smoke.log

      - name: Collect Compose diagnostics
        if: always()
        run: |
          mkdir -p compose-diagnostics
          if [ -f .env ]; then
            docker compose ps > compose-diagnostics/compose-ps.txt || true
            docker compose logs --no-color > compose-diagnostics/compose-logs.txt || true
          fi

      - name: Write Compose evidence index
        if: always()
        run: |
          if [ -f compose-diagnostics/compose-evidence-index.txt ]; then
            cp compose-diagnostics/compose-evidence-index.txt compose-evidence-index.txt
            exit 0
          fi
          cat <<'EOF' > compose-evidence-index.txt
          workflow: integration.yml
          smoke-command: uv run python scripts/compose_runtime_smoke.py
          artifact-name: compose-evidence-index
          status: smoke did not write activation evidence
          evidence-files:
            - compose-runtime-smoke.log
            - compose-diagnostics/
          EOF

      - name: Upload Compose diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compose-runtime-smoke
          path: |
            compose-runtime-smoke.log
            compose-diagnostics/
          if-no-files-found: ignore

      - name: Upload Compose evidence index
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compose-evidence-index
          path: compose-evidence-index.txt
          if-no-files-found: error

      - name: Tear down Compose volumes
        if: always()
        run: |
          if [ -f .env ]; then
            docker compose down --remove-orphans --volumes
          fi

  kind-smoke:
    name: Helm Kind Smoke
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v4

      - name: Install Python dependencies
        run: uv sync --all-extras --dev

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Install KinD
        uses: helm/kind-action@v1.12.0
        with:
          install_only: true

      - name: Verify Kubernetes toolchain
        run: |
          helm version
          kubectl version --client
          kind version

      - name: Run Helm KinD smoke
        run: uv run python scripts/helm_smoke.py --cluster-runtime kind

      - name: Collect KinD diagnostics
        if: always()
        run: |
          kubectl get all -n dimoorun-smoke -o wide > kind-resources.txt || true
          kubectl get networkpolicy,poddisruptionbudget -n dimoorun-smoke > kind-policies.txt || true
          helm status dimoorun-smoke --namespace dimoorun-smoke > kind-helm-status.txt || true

      - name: Write KinD evidence index
        if: always()
        run: |
          cat <<'EOF' > kind-smoke-evidence-index.txt
          workflow: integration.yml
          smoke-command: uv run python scripts/helm_smoke.py --cluster-runtime kind
          artifact-name: kind-smoke
          evidence-files:
            - kind-resources.txt
            - kind-policies.txt
            - kind-helm-status.txt
          EOF

      - name: Upload KinD diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kind-smoke
          path: |
            kind-resources.txt
            kind-policies.txt
            kind-helm-status.txt
          if-no-files-found: ignore

      - name: Upload KinD evidence index
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kind-smoke-index
          path: kind-smoke-evidence-index.txt
          if-no-files-found: error
