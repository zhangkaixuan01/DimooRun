image:
  repository: dimoorun
  tag: latest
  pullPolicy: IfNotPresent

server:
  replicas: 2
  port: 8000
  resources: {}
  service:
    type: ClusterIP
  probes:
    startup:
      path: /healthz
      failureThreshold: 30
      periodSeconds: 10
    readiness:
      path: /healthz
      periodSeconds: 10
    liveness:
      path: /healthz
      periodSeconds: 20

worker:
  replicas: 2
  resources: {}

console:
  replicas: 1
  port: 80
  resources: {}
  ingress:
    enabled: false
    host: console.local

postgres:
  external:
    enabled: true
    urlSecretRef: dimoorun-postgres-url

redis:
  external:
    enabled: true
    urlSecretRef: dimoorun-redis-url

objectStore:
  external:
    enabled: true
    endpointUrl: http://minio:9000
    bucket: dimoorun-artifacts
    secretRef: dimoorun-object-store

secretProvider:
  mode: kubernetes

sandbox:
  mode: container
  cpuLimit: 1000m
  memoryLimit: 1Gi

resources:
  defaults:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

migrationJob:
  enabled: true
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  resources: {}

networkPolicy:
  enabled: true
  allowDns: true

podDisruptionBudget:
  enabled: true
  minAvailable: 1

serviceMonitor:
  enabled: true
  interval: 30s
  scrapeTimeout: 10s
  path: /metrics
