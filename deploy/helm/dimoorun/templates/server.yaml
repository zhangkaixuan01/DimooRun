apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dimoorun.fullname" . }}-server
spec:
  replicas: {{ .Values.server.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: dimoorun-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dimoorun-server
    spec:
      serviceAccountName: {{ include "dimoorun.fullname" . }}
      containers:
        - name: server
          image: "{{ .Values.image.repository }}-server:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.server.port }}
          envFrom:
            - configMapRef:
                name: {{ include "dimoorun.fullname" . }}-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgres.external.urlSecretRef }}
                  key: url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.redis.external.urlSecretRef }}
                  key: url
            - name: OBJECT_STORE_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.objectStore.external.secretRef }}
                  key: accessKey
            - name: OBJECT_STORE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.objectStore.external.secretRef }}
                  key: secretKey
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "dimoorun.fullname" . }}-server
spec:
  selector:
    app.kubernetes.io/name: dimoorun-server
  ports:
    - port: {{ .Values.server.port }}
      targetPort: {{ .Values.server.port }}
