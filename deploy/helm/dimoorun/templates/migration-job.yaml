{{- if .Values.migrationJob.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "dimoorun.fullname" . }}-migration
  labels:
{{ include "dimoorun.labels" . | indent 4 }}
    app.kubernetes.io/component: migration
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  backoffLimit: {{ .Values.migrationJob.backoffLimit }}
  ttlSecondsAfterFinished: {{ .Values.migrationJob.ttlSecondsAfterFinished }}
  template:
    metadata:
      labels:
{{ include "dimoorun.labels" . | indent 8 }}
        app.kubernetes.io/component: migration
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ include "dimoorun.fullname" . }}
      containers:
        - name: migration
          image: "{{ .Values.image.repository }}-server:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["python", "-m", "dimoo_run.ops.init_db"]
          envFrom:
            - configMapRef:
                name: {{ include "dimoorun.fullname" . }}-config
          env:
            - name: DIMOORUN_SKIP_DB_INIT
              value: "false"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgres.external.urlSecretRef }}
                  key: url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.redis.external.urlSecretRef }}
                  key: url
            - name: OBJECT_STORE_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.objectStore.external.secretRef }}
                  key: accessKey
            - name: OBJECT_STORE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.objectStore.external.secretRef }}
                  key: secretKey
          resources:
{{ toYaml (mergeOverwrite (deepCopy .Values.resources.defaults) .Values.migrationJob.resources) | indent 12 }}
{{- end }}
