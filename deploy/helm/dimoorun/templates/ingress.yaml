{{- if .Values.console.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "dimoorun.fullname" . }}-console
spec:
  rules:
    - host: {{ .Values.console.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "dimoorun.fullname" . }}-console
                port:
                  number: {{ .Values.console.port }}
{{- end }}
