apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dimoorun.fullname" . }}-console
  labels:
{{ include "dimoorun.labels" . | indent 4 }}
{{ include "dimoorun.consoleLabels" . | indent 4 }}
spec:
  replicas: {{ .Values.console.replicas }}
  selector:
    matchLabels:
{{ include "dimoorun.consoleLabels" . | indent 6 }}
  template:
    metadata:
      labels:
{{ include "dimoorun.labels" . | indent 8 }}
{{ include "dimoorun.consoleLabels" . | indent 8 }}
    spec:
      containers:
        - name: console
          image: "{{ .Values.image.repository }}-console:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.console.port }}
          readinessProbe:
            httpGet:
              path: /
              port: {{ .Values.console.port }}
          livenessProbe:
            httpGet:
              path: /
              port: {{ .Values.console.port }}
          resources:
{{ toYaml (mergeOverwrite (deepCopy .Values.resources.defaults) .Values.console.resources) | indent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "dimoorun.fullname" . }}-console
  labels:
{{ include "dimoorun.labels" . | indent 4 }}
{{ include "dimoorun.consoleLabels" . | indent 4 }}
spec:
  selector:
{{ include "dimoorun.consoleLabels" . | indent 4 }}
  ports:
    - port: {{ .Values.console.port }}
      targetPort: {{ .Values.console.port }}
