services:
  migrator:
    build:
      context: .
      dockerfile: deploy/docker/server.Dockerfile
    env_file: .env
    environment:
      DIMOORUN_RUNTIME_MODE: dev
      DATABASE_URL: postgresql+psycopg://dimoorun:dimoorun@postgres:5432/dimoorun
      REDIS_URL: redis://redis:6379/0
      OBJECT_STORE_ENDPOINT_URL: http://minio:9000
      DIMOORUN_NATIVE_RUNTIME_STORE: sqlalchemy
      DIMOORUN_SECRET_PROVIDER: memory
      DIMOORUN_SKIP_DB_INIT: "false"
    command: ["python", "-m", "dimoo_run.ops.init_db"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: "no"

  server:
    build:
      context: .
      dockerfile: deploy/docker/server.Dockerfile
    env_file: .env
    environment:
      DIMOORUN_RUNTIME_MODE: dev
      DATABASE_URL: postgresql+psycopg://dimoorun:dimoorun@postgres:5432/dimoorun
      REDIS_URL: redis://redis:6379/0
      OBJECT_STORE_ENDPOINT_URL: http://minio:9000
      DIMOORUN_NATIVE_RUNTIME_STORE: sqlalchemy
      DIMOORUN_SECRET_PROVIDER: memory
      DIMOORUN_SKIP_DB_INIT: "true"
    ports:
      - "8000:8000"
    depends_on:
      migrator:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: .
      dockerfile: deploy/docker/worker.Dockerfile
    env_file: .env
    environment:
      DIMOORUN_RUNTIME_MODE: dev
      DATABASE_URL: postgresql+psycopg://dimoorun:dimoorun@postgres:5432/dimoorun
      REDIS_URL: redis://redis:6379/0
      OBJECT_STORE_ENDPOINT_URL: http://minio:9000
      DIMOORUN_NATIVE_RUNTIME_STORE: sqlalchemy
      DIMOORUN_SECRET_PROVIDER: memory
      DIMOORUN_SKIP_DB_INIT: "true"
    depends_on:
      migrator:
        condition: service_completed_successfully
      server:
        condition: service_healthy

  console:
    build:
      context: .
      dockerfile: deploy/docker/console.Dockerfile
    env_file: .env
    environment:
      DIMOORUN_RUNTIME_MODE: dev
    ports:
      - "5173:5173"
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:5173/').then((response)=>{if(!response.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: dimoorun
      POSTGRES_PASSWORD: dimoorun
      POSTGRES_DB: dimoorun
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dimoorun -d dimoorun"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: dimoorun
      MINIO_ROOT_PASSWORD: dimoorun-dev-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mc alias set local http://localhost:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD >/dev/null 2>&1 && mc ready local",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  minio-data:
